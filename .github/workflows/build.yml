name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      releases: write

    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            arch: x64
            build_command: npx electron-builder --windows --x64 --publish always
          - os: macos-14
            arch: x64
            build_command: npx electron-builder --mac dmg --x64 --publish always
          - os: ubuntu-latest
            arch: x64
            build_command: npx electron-builder --linux --x64 --publish always

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Dependencies
        run: npm install
        env:
          npm_config_arch: x64

      - name: Get version and name from package.json
        id: get_version_name
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2.0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version_name.outputs.version }}
          name: Release ${{ steps.get_version_name.outputs.version }}
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Electron App
        run: ${{ matrix.build_command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}